services:
  mysql:
    image: mysql:8.0
    container_name: docreview-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: docreview
      MYSQL_USER: docreview
      MYSQL_PASSWORD: docreview
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
